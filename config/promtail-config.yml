server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ── Logs del sistema host ──────────────────
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          host: docker-host
          __path__: /var/log/*.log

  # ── Logs de todos los contenedores Docker ──
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
      - source_labels: [__meta_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_compose_project]
        target_label: project

  # ── fail2ban (corre en el host, no en contenedor) ──
  - job_name: fail2ban
    static_configs:
      - targets:
          - localhost
        labels:
          job: fail2ban
          host: docker-host
          __path__: /var/log/fail2ban.log
    pipeline_stages:
      - match:
          selector: '{job="fail2ban"} |~ "(Ban|Unban)"'
          stages:
            - regex:
                expression: '^\S+\s+\S+\s+fail2ban\.actions\s+\[\d+\]:\s+\w+\s+\[(?P<jail>[\w-]+)\]\s+(?P<action>Ban|Unban)\s+(?P<ip>[0-9a-fA-F:.]+)'
            - labels:
                jail:
                action:
      - match:
          selector: '{job="fail2ban"} |~ "Found"'
          stages:
            - regex:
                expression: '^\S+\s+\S+\s+fail2ban\.filter\s+\[\d+\]:\s+\w+\s+\[(?P<jail>[\w-]+)\]\s+(?P<action>Found)\s+(?P<ip>[0-9a-fA-F:.]+)'
            - labels:
                jail:
                action:

  # ── auth.log (intentos de login SSH/PAM) ──
  - job_name: auth
    static_configs:
      - targets:
          - localhost
        labels:
          job: auth
          host: docker-host
          __path__: /var/log/auth.log

  # ── Nginx Proxy Manager access logs (stack Docker separado en el mismo host) ──
  - job_name: npm_access
    static_configs:
      - targets:
          - localhost
        labels:
          job: npm_access
          __path__: /mnt/npm-logs/proxy-host-*_access.log
    pipeline_stages:
      - regex:
          source: filename
          expression: '.*proxy-host-(?P<proxy_host_id>\d+)_access\.log'
      - labels:
          proxy_host_id:
      - regex:
          expression: '^(?P<remote_addr>\S+) \S+ \S+ \[(?P<time>[^\]]+)\] "(?P<method>\S+) (?P<path>\S+) \S+" (?P<status>\d{3}) (?P<bytes>\d+) "(?P<referer>[^"]*)" "(?P<user_agent>[^"]*)"'
      - labels:
          method:
          status:
