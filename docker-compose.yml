version: "3.8"

networks:
  loki-net:
    driver: bridge

volumes:
  loki-data:
  grafana-data:

services:
  # ──────────────────────────────────────────
  # Loki — almacén de logs
  # ──────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.5
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - loki-net
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Promtail — recolector / agente de logs
  # ──────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.5
    container_name: promtail
    volumes:
      - ./config/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro # logs del sistema host
      - /var/lib/docker/containers:/var/lib/docker/containers:ro # logs Docker
    command: -config.file=/etc/promtail/config.yml
    networks:
      - loki-net
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  # ──────────────────────────────────────────
  # Grafana — visualización y dashboards
  # ──────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3033:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana-datasource.yml:/etc/grafana/provisioning/datasources/loki.yml:ro
    networks:
      - loki-net
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped
