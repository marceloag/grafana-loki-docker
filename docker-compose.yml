version: "3.8"

networks:
  loki-net:
    driver: bridge

volumes:
  loki-data:
  grafana-data:
  prometheus-data:

services:
  # ──────────────────────────────────────────
  # Loki — almacén de logs
  # ──────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.5
    container_name: loki
    ports:
      - "3200:3100"
    volumes:
      - ./config/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - loki-net
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Promtail — recolector / agente de logs
  # ──────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.5
    container_name: promtail
    volumes:
      - ./config/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro # logs del sistema host
      - /var/lib/docker/containers:/var/lib/docker/containers:ro # logs Docker
      - /var/run/docker.sock:/var/run/docker.sock:ro # socket Docker (discovery de contenedores)
      - ${NPM_LOGS_PATH}:/mnt/npm-logs:ro # logs de Nginx Proxy Manager (stack separado)
    command: -config.file=/etc/promtail/config.yml
    networks:
      - loki-net
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  # ──────────────────────────────────────────
  # Prometheus — métricas del sistema
  # ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    networks:
      - loki-net
    restart: unless-stopped

  # ──────────────────────────────────────────
  # node-exporter — métricas de host (CPU/RAM/disco/red)
  # ──────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    networks:
      - loki-net
    restart: unless-stopped

  # ──────────────────────────────────────────
  # Grafana — visualización y dashboards
  # ──────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3035:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana-datasource.yml:/etc/grafana/provisioning/datasources/loki.yml:ro
      - ./config/grafana-datasource-prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./config/grafana-dashboards-provider.yml:/etc/grafana/provisioning/dashboards/provider.yml:ro
      - ./config/dashboards:/etc/grafana/provisioning/dashboards/json:ro
    networks:
      - loki-net
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_started
    restart: unless-stopped
